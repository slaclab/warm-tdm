field_guide:
  entity: "Synthesizable RTL entity name"
  path: "Path to the synthesizable RTL source file"
  subsystem: "Warm-TDM grouping used for rollout tracking"
  tier: "One of functional_python, wrapper_required, integration_sim, deferred_ip_backed"
  status: "Current implementation state for this module"
  priority: "Pilot / near-term / later rollout tag"
  wrapper_path: "Optional cocotb-facing VHDL wrapper"
  python_test: "Planned or implemented Python regression entrypoint"
  reference_assets: "Optional supporting simulation files or legacy assets"
  notes: "Short implementation notes"
  deferred_reason: "Required when tier is deferred_ip_backed"

inventory_rules:
  - "Each synthesizable warm-tdm RTL entity should eventually appear once in this inventory."
  - "Executable regression logic lives in Python."
  - "Checked-in VHDL remains limited to wrappers, shims, and required simulation support."
  - "Existing board and ASIC models are support assets, not the default execution path."

